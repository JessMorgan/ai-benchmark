default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: ["--fix"]
        name: ruff check

  - repo: local
    hooks:
      - id: python-syntax-check
        name: Python syntax check
        entry: python -m py_compile
        language: system
        types: [python]

      - id: mypy
        name: mypy type check
        entry: mypy
        language: system
        types: [python]
        require_serial: true

      - id: cli-smoke-test
        name: CLI smoke test
        entry: python ai-benchmark.py --dump-default-config
        language: system
        pass_filenames: false
        types: [python]

      - id: tests-pre-push
        name: Run unit tests with coverage
        entry: bash scripts/pre-push-tests.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
