name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files

      - name: Lint with ruff
        run: |
          ruff check ai-benchmark.py benchmark_core.py benchmark_plugin.py plugins tests

      - name: Run unit tests with coverage
        run: |
          coverage run -m pytest tests/ plugins/challenges/ plugins/outputs/ -q
          coverage report -m

      - name: Enforce minimum coverage threshold
        run: |
          coverage report --fail-under=90

      - name: Syntax check all Python files
        run: |
          python -m py_compile ai-benchmark.py benchmark_core.py benchmark_plugin.py \
            plugins/__init__.py plugins/rate_limiter.py plugins/moe_dense.py

      - name: CLI smoke test
        run: |
          python ai-benchmark.py --dump-default-config > /dev/null
